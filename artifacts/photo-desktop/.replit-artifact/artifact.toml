kind = "web"
previewPath = "/"
title = "Photo Desktop"
version = "1.0.0"
id = "artifacts/photo-desktop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24911

[services.development]
run = "pnpm --filter @workspace/photo-desktop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/photo-desktop", "run", "build" ]
publicDir = "artifacts/photo-desktop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24911"
BASE_PATH = "/"
